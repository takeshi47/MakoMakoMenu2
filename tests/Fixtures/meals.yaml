  meal_breakfast_1:
    mealType: "breakfast"
    menu: ["@menu_1"] # カレー
    sortOrder: 1
  meal_lunch_1:
    mealType: "lunch"
    menu: ["@menu_2"] # 肉じゃが
    sortOrder: 2
  meal_dinner_1:
    mealType: "dinner"
    menu: ["@menu_3"] # 野菜炒め
    sortOrder: 3

  # daily_2 (2026-03-02) 用
  meal_breakfast_2:
