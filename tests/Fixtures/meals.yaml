    sortOrder: 1
  meal_lunch_2:
    mealType: "lunch"
    menu: ["@menu_1"] # カレー
    sortOrder: 2
  meal_dinner_2:
    mealType: "dinner"
    menu: ["@menu_3"] # 野菜炒め
    sortOrder: 3

  # その他のデータはランダム
  meal_breakfast_3:
    mealType: "breakfast"
